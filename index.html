<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- Content-Security-Policy: locks down resource loading to trusted sources.
         Adjust 'connect-src' if you add more external APIs. -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' https://accounts.google.com https://apis.google.com;
        connect-src 'self'
          https://accounts.google.com
          https://oauth2.googleapis.com
          https://www.googleapis.com
          https://www.google.com
          https://boardgamegeek.com;
        frame-src https://accounts.google.com;
        img-src 'self' data: blob: https: https://lh3.googleusercontent.com https://cf.geekdo-images.com https://boardgamegeek.com;
        style-src 'self' 'unsafe-inline';
        object-src 'none';
        base-uri 'self';
      "
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="apple-touch-icon-precomposed" href="/favicon.png" />
    <!-- Preconnect + preload Google Identity Services to reduce sign-in button latency -->
    <link rel="preconnect" href="https://accounts.google.com" crossorigin />
    <link rel="preload" href="https://accounts.google.com/gsi/client" as="script" />
    <script src="https://accounts.google.com/gsi/client" async></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="description" content="MeepleMind - Registre suas partidas de boardgames com amigos, acompanhe histórico e veja suas estatísticas!" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MeepleMind" />
    <title>MeepleMind - Registre suas partidas de boardgames</title>
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
